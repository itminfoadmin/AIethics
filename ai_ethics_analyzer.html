<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI_Ethics_Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background:#eef1f5; color:#2c3e50; font-size:16px;
}
.page-wrap { max-width:80%; margin:0 auto; }

/* ── Fixed Header Group ── */
.fixed-header {
  position:fixed; top:0; left:0; right:0; z-index:100;
}

.page-title {
  text-align:center; font-size:24px; font-weight:700;
  padding:16px 0 10px; background:linear-gradient(135deg,#1e293b,#334155);
  color:#fff; letter-spacing:2px;
  border-bottom:none;
}

.topbar {
  background:#fff; border-bottom:1px solid #e2e8f0; padding:10px 20px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.topbar-inner { max-width:80%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; width:100%; flex-wrap:wrap; gap:8px; }
.topbar-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.topbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.topbar select {
  padding:6px 12px; border:1px solid #cbd5e1; border-radius:6px;
  font-size:15px; background:#fff; cursor:pointer; min-width:110px;
  font-family:inherit; color:#334155;
  transition:border-color .15s;
}
.topbar select:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.15); }

.btn {
  padding:7px 16px; border:none; border-radius:6px; cursor:pointer;
  font-size:15px; font-weight:600; font-family:inherit;
  transition:all .15s; letter-spacing:.3px;
}
.btn:hover { transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.15); }
.btn:active { transform:translateY(0); }
.btn-dark   { background:#1e293b; color:#fff; }
.btn-gray   { background:#64748b; color:#fff; }
.btn-green  { background:#16a34a; color:#fff; }
.btn-red    { background:#dc2626; color:#fff; }
.btn-blue   { background:#2563eb; color:#fff; }

/* ── Analysis Modal ── */
.analysis-overlay {
  display:none; position:fixed; inset:0; background:rgba(15,23,42,.55);
  z-index:2000; backdrop-filter:blur(2px);
}
.analysis-overlay.show { display:block; }
.analysis-box {
  background:#fff; width:92%; max-width:1200px; height:85vh; border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  position:absolute; left:50%; top:40px; transform:translateX(-50%);
  display:flex; flex-direction:column;
}
.analysis-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 24px; background:linear-gradient(135deg,#1e293b,#334155);
  border-radius:10px 10px 0 0; color:#fff;
  cursor:grab; user-select:none; flex-shrink:0;
}
.analysis-header:active { cursor:grabbing; }
.analysis-title { font-size:17px; font-weight:700; letter-spacing:.5px; }
.analysis-subtitle { font-size:14px; color:#94a3b8; margin-left:12px; font-weight:400; }
.analysis-body { padding:24px; flex:1; overflow-y:auto; border-radius:0 0 10px 10px; }
.analysis-charts { display:flex; flex-direction:column; gap:28px; }
.analysis-chart-section { }
.analysis-chart-title {
  font-size:16px; font-weight:700; color:#1e293b; margin-bottom:12px;
  padding-bottom:6px; border-bottom:2px solid #e2e8f0;
}
.analysis-chart-wrap {
  background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px;
  padding:16px;
}
.analysis-summary {
  margin-top:24px; background:#f8fafc; border:1px solid #e2e8f0;
  border-radius:8px; overflow-x:auto;
}
.analysis-summary table {
  width:100%; border-collapse:collapse; font-size:15px;
}
.analysis-summary th {
  background:#1e293b; color:#fff; padding:8px 12px; text-align:center;
  font-size:14px; font-weight:600; letter-spacing:.3px;
}
.analysis-summary td {
  padding:7px 12px; border-bottom:1px solid #e2e8f0; text-align:center;
  color:#475569;
}
.analysis-summary tr:hover td { background:#eef2ff; }

/* Analysis loading */
.analysis-loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; min-height:100%; gap:16px; color:#475569; font-size:17px; font-weight:600;
}
.analysis-spinner {
  width:40px; height:40px; border:4px solid #e2e8f0;
  border-top-color:#3b82f6; border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Summary Sheet Modal ── */
.summary-overlay {
  display:none; position:fixed; inset:0; background:rgba(15,23,42,.55);
  z-index:2000; backdrop-filter:blur(2px);
}
.summary-overlay.show { display:block; }
.summary-box {
  background:#fff; width:94%; max-width:1300px; height:88vh; border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  position:absolute; left:50%; top:30px; transform:translateX(-50%);
  display:flex; flex-direction:column;
}
.summary-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px; background:linear-gradient(135deg,#1e293b,#334155);
  border-radius:10px 10px 0 0; color:#fff;
  cursor:grab; user-select:none; flex-shrink:0;
}
.summary-header:active { cursor:grabbing; }
.summary-title { font-size:17px; font-weight:700; letter-spacing:.5px; }
.summary-body {
  flex:1; overflow:auto; padding:16px;
  border-radius:0 0 10px 10px;
}
.summary-body table {
  width:100%; border-collapse:collapse; font-size:13px; table-layout:auto;
}
.summary-body th {
  background:#1e293b; color:#fff; padding:6px 8px; font-size:12px; font-weight:600;
  border:1px solid #334155; text-align:center; white-space:nowrap;
  position:sticky; top:0; z-index:1;
}
.summary-body td {
  padding:5px 8px; border:1px solid #e2e8f0; text-align:center;
  word-break:break-word; color:#334155;
}
.summary-body tr:nth-child(even) td { background:#f8fafc; }
.summary-body tr:hover td { background:#eef2ff; }
.summary-body .header-row td {
  background:#e2e8f0; font-weight:700; color:#1e293b;
  position:sticky; top:0; z-index:1; border:1px solid #cbd5e1;
}
.summary-loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; min-height:100%; gap:16px; color:#475569; font-size:17px; font-weight:600;
}

.info-bar {
  background:#f8fafc; padding:6px 20px; border-bottom:1px solid #e2e8f0;
  font-size:14px; color:#94a3b8; display:flex; justify-content:space-between;
}
.info-bar-inner { max-width:80%; margin:0 auto; display:flex; justify-content:space-between; width:100%; }

/* ── Header spacer ── */
.header-spacer { height:120px; }

/* ── Card list ── */
.card-list { padding:16px 20px 40px; }

.card {
  background:#fff; border:1px solid #e2e8f0; border-radius:8px;
  margin-bottom:12px; overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
  transition:box-shadow .15s;
}
.card:hover { box-shadow:0 2px 8px rgba(0,0,0,.08); }

.card-header {
  display:flex; align-items:center; flex-wrap:wrap; gap:8px;
  padding:10px 16px; border-bottom:1px solid #f1f5f9; background:#f8fafc;
  font-size:15px;
}
.card-header .resid {
  font-weight:700; color:#1e293b;
  margin-right:6px;
}
.card-header .btn-modal {
  padding:3px 10px; border:1px solid #cbd5e1; border-radius:5px;
  background:#fff; color:#3b82f6; font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all .15s;
  white-space:nowrap;
}
.card-header .btn-modal:hover { background:#3b82f6; color:#fff; border-color:#3b82f6; }
.card-header .meta-tag {
  font-weight:600; color:#475569; font-size:14px;
  background:#e2e8f0; padding:2px 8px; border-radius:4px;
}
.card-header .meta-tag .meta-label { color:#94a3b8; font-weight:500; margin-right:3px; }

.card-header .kso-label {
  margin-left:auto; font-weight:600; color:#64748b; cursor:default;
  width:400px; text-align:center; flex-shrink:0; font-size:13px;
  letter-spacing:.5px;
}

.card-body { display:flex; gap:0; min-height:0; }
.card-responses { flex:1; min-width:0; padding:14px 14px 16px; overflow:hidden; }
.card-kso-area {
  width:400px; min-width:340px; max-width:400px; border-left:1px solid #f1f5f9;
  padding:12px 16px; display:flex; flex-direction:column; gap:10px;
  background:#fafbfc; flex-shrink:0; align-items:center;
}

.kso-field-row { display:flex; align-items:center; gap:6px; width:100%; }
.kso-field-label {
  font-size:13px; font-weight:600; color:#64748b;
  min-width:72px; letter-spacing:.3px; text-align:right;
}
.kso-field-input {
  flex:1; border:2px solid #94a3b8; border-radius:5px;
  padding:12px 10px; font-size:14px; font-family:inherit; color:#1e293b;
  transition:border-color .15s; background:#fff; text-align:left;
  min-height:42px; font-weight:600;
}
.kso-field-input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.12); }

.resp-row { display:flex; align-items:flex-start; margin-bottom:10px; }
.resp-label-side {
  width:90px; min-width:90px; font-weight:600; font-size:13.5px;
  padding-top:9px; color:#64748b; letter-spacing:.2px;
}
.resp-text {
  flex:1; min-width:0; border:1px solid #e2e8f0; border-radius:6px; padding:10px 12px;
  min-height:52px; font-size:14.5px; line-height:1.6;
  background:#fff; white-space:pre-wrap; word-break:break-word;
  color:#475569;
}

/* ── Personal Modal ── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(15,23,42,.5);
  z-index:2000; backdrop-filter:blur(2px);
}
.modal-overlay.show { display:block; }
.modal-box {
  background:#fff; width:90%; max-width:1100px; height:85vh; border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  position:absolute; left:50%; top:50px; transform:translateX(-50%);
  display:flex; flex-direction:column;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 24px; border-bottom:1px solid #e2e8f0;
  background:linear-gradient(135deg,#1e293b,#334155);
  border-radius:10px 10px 0 0;
  cursor:grab; user-select:none; color:#fff;
  flex-shrink:0;
}
.modal-header:active { cursor:grabbing; }
.modal-header-left { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
.modal-field-label { font-size:15px; font-weight:600; color:#94a3b8; }
.modal-field-value { font-size:16px; font-weight:600; color:#fbbf24; margin-left:4px; }
.modal-sep { width:1px; height:20px; background:rgba(255,255,255,.2); }
.modal-close-btn {
  background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.2);
  border-radius:6px; padding:6px 14px; font-size:14px; font-weight:600; cursor:pointer;
  transition:background .15s;
}
.modal-close-btn:hover { background:rgba(255,255,255,.25); }
.modal-body { padding:0; flex:1; overflow-y:auto; border-radius:0 0 10px 10px; }

.modal-dilemma { padding:16px 24px; border-bottom:1px solid #f1f5f9; }
.modal-dilemma:last-child { border-bottom:none; }
.modal-dilemma-header { display:flex; align-items:center; gap:16px; margin-bottom:10px; }
.modal-dilemma-title { font-size:15.5px; font-weight:600; color:#1e293b; flex:1; }
.modal-dilemma-kso-label { font-size:14px; font-weight:600; color:#64748b; width:220px; text-align:center; }
.modal-dilemma-body { display:flex; gap:16px; align-items:flex-start; }
.modal-resp-area { flex:1; display:flex; flex-direction:column; gap:8px; }
.modal-resp-row { display:flex; align-items:flex-start; gap:10px; }
.modal-resp-label { min-width:85px; font-size:14px; font-weight:600; color:#64748b; padding-top:7px; }
.modal-resp-text {
  flex:1; border:1px solid #e2e8f0; border-radius:6px; padding:8px 10px;
  font-size:15px; background:#f8fafc; color:#475569; line-height:1.6;
  min-height:36px; font-family:inherit;
  white-space:pre-wrap; word-break:break-word;
}
.modal-kso-area { width:220px; min-width:220px; display:flex; flex-direction:column; gap:6px; justify-content:center; }
.modal-kso-row { display:flex; align-items:center; gap:6px; }
.modal-kso-label { font-size:13px; font-weight:600; color:#64748b; min-width:72px; }
.modal-kso-value {
  flex:1; border:1px solid #e2e8f0; border-radius:5px; padding:5px 8px;
  font-size:14px; background:#f1f5f9; color:#475569; font-family:inherit;
  min-height:26px;
}

/* ── Dilemma Docs Modal ── */
.docs-modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(15,23,42,.5);
  z-index:2000; backdrop-filter:blur(2px);
}
.docs-modal-overlay.show { display:block; }
.docs-modal-box {
  background:#fff; width:85%; max-width:960px; height:80vh; border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  position:absolute; left:50%; top:50px; transform:translateX(-50%);
  display:flex; flex-direction:column;
}
.docs-modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 24px; background:linear-gradient(135deg,#1e293b,#334155); color:#fff;
  border-radius:10px 10px 0 0;
  cursor:grab; user-select:none;
}
.docs-modal-header:active { cursor:grabbing; }
.docs-modal-title { font-size:16px; font-weight:600; letter-spacing:.5px; }
.docs-modal-iframe { flex:1; border:none; border-radius:0 0 10px 10px; }

/* ── Status ── */
.status-toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#1e293b; color:#fff; padding:10px 28px; border-radius:8px;
  font-size:15px; z-index:999; display:none; box-shadow:0 4px 16px rgba(0,0,0,.2);
  font-weight:500;
}
.status-toast.show { display:block; }

/* ── Loading ── */
.loading-overlay {
  position:fixed; inset:0; background:rgba(255,255,255,.8);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; font-size:17px; font-weight:600; color:#334155;
  backdrop-filter:blur(2px);
}
.loading-overlay.hidden { display:none; }

/* ── Print ── */
@media print {
  @page { size:landscape; margin:10mm; }
  .fixed-header, .header-spacer, .loading-overlay, .status-toast,
  .modal-overlay, .docs-modal-overlay { display:none !important; }
  body { background:#fff; font-size:11px; }
  .page-wrap { max-width:100%; }

  /* 기본 카드 인쇄 */
  .card-list { padding:0; }
  .card {
    break-inside:avoid; border:1px solid #ddd; border-radius:0;
    margin-bottom:8px; box-shadow:none;
  }
  .card-header { background:#f5f5f5; border-bottom:1px solid #ddd; padding:6px 10px; }
  .card-responses { padding:6px 8px; }
  .card-kso-area {
    width:200px; min-width:200px; max-width:200px;
    padding:4px 6px; border-left:1px solid #ddd;
  }
  .card-header .kso-label { width:200px; font-size:10px; }
  .resp-text {
    border:1px solid #ddd; font-size:10.5px; padding:4px 6px;
    max-height:none; overflow:visible;
  }
  .resp-label-side { font-size:10px; width:70px; min-width:70px; }
  .kso-field-input {
    border:2px solid #94a3b8; font-size:10px; padding:3px 5px; font-weight:600;
  }

  /* 분석 모달 인쇄 모드 (A4 세로) */
  body.printing-analysis { }
  body.printing-analysis .page-wrap { display:none !important; }
  body.printing-analysis .modal-overlay,
  body.printing-analysis .docs-modal-overlay { display:none !important; }
  body.printing-analysis .analysis-overlay {
    display:block !important; position:static !important;
    background:none !important; backdrop-filter:none !important;
    overflow:visible !important;
  }
  body.printing-analysis .analysis-box {
    width:100% !important; max-width:100% !important; height:auto !important;
    margin:0 !important; border-radius:0 !important;
    box-shadow:none !important; position:static !important;
    transform:none !important; display:block !important;
  }
  body.printing-analysis .analysis-header {
    background:#1e293b !important; -webkit-print-color-adjust:exact;
    print-color-adjust:exact; border-radius:0 !important;
  }
  body.printing-analysis .modal-close-btn { display:none !important; }
  body.printing-analysis .analysis-body {
    overflow:visible !important; max-height:none !important;
    height:auto !important;
  }
  body.printing-analysis .analysis-chart-wrap {
    border:1px solid #ddd; background:#fff !important;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    overflow:visible !important;
  }
  body.printing-analysis .analysis-summary table {
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  body.printing-analysis canvas {
    max-width:100% !important;
  }
  body.printing-analysis .analysis-chart-section {
    break-inside:avoid;
  }
}
</style>
</head>
<body>
<div class="page-wrap">

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">데이터 로딩 중...</div>

<!-- Fixed Header -->
<div class="fixed-header" id="fixedHeader">
  <div class="page-title">AI_Ethics_Analyzer</div>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <select id="selDilemma">
          <option value="1" selected>Dilemma-01</option>
          <option value="2">Dilemma-02</option>
          <option value="3">Dilemma-03</option>
          <option value="4">Dilemma-04</option>
        </select>
        <select id="selOrientation">
          <option value="전체">Orientation</option>
        </select>
        <select id="selScheme">
          <option value="전체">Scheme</option>
        </select>
      </div>
      <div class="topbar-right">
        <button class="btn btn-dark" onclick="openDocsModal()">Dilemma 보기</button>
        <button class="btn btn-blue" onclick="openAnalysisModal('orientation')">Orientation 분석</button>
        <button class="btn btn-blue" onclick="openAnalysisModal('scheme')">Scheme 분석</button>
        <button class="btn btn-gray" onclick="loadData()">Reload</button>
        <button class="btn btn-green" onclick="saveAll()">Save</button>
        <button class="btn btn-red" onclick="printSummarySheet()">결과 시트 보기</button>
      </div>
    </div>
  </div>
  <div class="info-bar">
    <div class="info-bar-inner">
      <span id="infoLeft">필터: Dilemma-01</span>
      <span id="infoRight">총 0건</span>
    </div>
  </div>
</div>
<div class="header-spacer"></div>

<!-- Cards -->
<div class="card-list" id="cardList"></div>

<!-- Status toast -->
<div class="status-toast" id="toast"></div>

</div><!-- /.page-wrap -->

<!-- Personal Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-left">
        <span><span class="modal-field-label">No.</span><span class="modal-field-value" id="mNo">-</span></span>
        <div class="modal-sep"></div>
        <span><span class="modal-field-label">ResID</span> <span class="modal-field-value" id="mResID">-</span></span>
        <div class="modal-sep"></div>
        <span><span class="modal-field-label">N2</span> <span class="modal-field-value" id="mN2">-</span></span>
        <div class="modal-sep"></div>
        <span><span class="modal-field-label">P%</span> <span class="modal-field-value" id="mP">-</span></span>
        <div class="modal-sep"></div>
        <span><span class="modal-field-label">Age</span> <span class="modal-field-value" id="mAge">-</span></span>
      </div>
      <button class="modal-close-btn" onclick="closeModal()">닫기 ✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Dilemma Docs Modal -->
<div class="docs-modal-overlay" id="docsModalOverlay" onclick="if(event.target===this)closeDocsModal()">
  <div class="docs-modal-box">
    <div class="docs-modal-header">
      <span class="docs-modal-title">Dilemma 문서</span>
      <button class="modal-close-btn" onclick="closeDocsModal()">닫기 ✕</button>
    </div>
    <iframe class="docs-modal-iframe" id="docsIframe" src=""></iframe>
  </div>
</div>

<!-- Analysis Modal -->
<div class="analysis-overlay" id="analysisOverlay" onclick="if(event.target===this)closeAnalysis()">
  <div class="analysis-box" id="analysisBox">
    <div class="analysis-header" id="analysisHeader">
      <div>
        <span class="analysis-title" id="analysisTitle">분석</span>
        <span class="analysis-subtitle" id="analysisSubtitle"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="modal-close-btn" onclick="printAnalysis()" style="background:rgba(255,255,255,.25);">출력 🖨</button>
        <button class="modal-close-btn" onclick="closeAnalysis()">닫기 ✕</button>
      </div>
    </div>
    <div class="analysis-body" id="analysisBody"></div>
  </div>
</div>

<!-- Summary Sheet Modal (removed - opens Google Sheet directly) -->

<script>
// ──────────────────────────────────────────
// ★ 설정: GAS 웹앱 URL
// ──────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8vivFydqIDIsWIx6OIOIVpMyxDSHyDrRMs3IoPYwe4jTe1AH-7HOvErLa0Eya6u0CEA/exec';

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTxvYoHn5_2scfnTs1XxBrOaPyOGWPSx3r_0Wb9ZWVA8-L3kDPfhzbRLXhWX4B9nvVld5wrxdAMSDD/pub?gid=1846865655&single=true&output=csv';

const HEADER_ROWS = 3;
const COL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXY';

let allData = [];

// ── Dilemma 매핑 (0-based index for raw array) ──
// A=0 B=1 C=2 D=3 E=4
// Dilemma1: F(5)=R1, G(6)=R2, H(7)=Keyword, I(8)=Scheme, J(9)=Orientation
// Dilemma2: K(10)=R1, L(11)=R2, M(12)=Keyword, N(13)=Scheme, O(14)=Orientation
// Dilemma3: P(15)=R1, Q(16)=R2, R(17)=Keyword, S(18)=Scheme, T(19)=Orientation
// Dilemma4: U(20)=R1, V(21)=R2, W(22)=Keyword, X(23)=Scheme, Y(24)=Orientation
const DILEMMA_MAP = {
  '1': { r1:5,  r2:6,  keyword:7,  scheme:8,  orientation:9,  keywordCol:'H', schemeCol:'I', orientationCol:'J' },
  '2': { r1:10, r2:11, keyword:12, scheme:13, orientation:14, keywordCol:'M', schemeCol:'N', orientationCol:'O' },
  '3': { r1:15, r2:16, keyword:17, scheme:18, orientation:19, keywordCol:'R', schemeCol:'S', orientationCol:'T' },
  '4': { r1:20, r2:21, keyword:22, scheme:23, orientation:24, keywordCol:'W', schemeCol:'X', orientationCol:'Y' },
};

// ── 결과 시트 탭 매핑 (GID) ──
const SUMMARY_TABS = {
  '1': { name: '※ AIQ1_Res_Sum', gid: '641366206' },
  '2': { name: '※ AIQ2_Res_Sum', gid: '773322116' },
  '3': { name: '※ AIQ3_Res_Sum', gid: '1804683253' },
  '4': { name: '※ AIQ4_Res_Sum', gid: '911876446' },
};
const SPREADSHEET_ID = '1mxaqSIXvMMwGZz-hB5nZT92WuzX_5ITOkq_JrLgOmww';

// ── CSV 파싱 ──
function parseCSV(text) {
  const lines = [];
  let current = '', inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      lines.push(current); current = '';
    } else {
      current += ch;
    }
  }
  if (current) lines.push(current);

  return lines.map(line => {
    const fields = [];
    let field = '', q = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (q && line[i+1] === '"') { field += '"'; i++; }
        else q = !q;
      } else if (ch === ',' && !q) {
        fields.push(field); field = '';
      } else {
        field += ch;
      }
    }
    fields.push(field);
    return fields;
  });
}

// ── 데이터 로드 ──
async function loadData() {
  showLoading(true);
  try {
    if (GAS_URL && GAS_URL !== 'YOUR_GAS_WEB_APP_URL_HERE') {
      const ok = await loadFromGAS();
      if (ok) { showLoading(false); return; }
    }
    await loadFromCSV();
  } catch(err) {
    console.error(err);
    showToast('로드 실패: ' + err.message, true);
  } finally {
    showLoading(false);
  }
}

// ── GAS에서 읽기 ──
async function loadFromGAS() {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const resp = await fetch(GAS_URL, { signal: controller.signal });
    clearTimeout(timeoutId);
    const json = await resp.json();
    if (json.status !== 'ok') throw new Error(json.message);

    allData = [];
    json.data.forEach(r => {
      if (r.B && r.B.trim() === 'Ready') return;

      const rawArr = COL_LETTERS.split('').map(c => r[c] || '');
      allData.push({
        rowNum: r.rowNum,
        raw: rawArr,
        A: r.A, B: r.B, C: r.C, D: r.D, E: r.E,
      });
    });

    renderCards();
    showToast('데이터 로드 완료: ' + allData.length + '건');
    return true;
  } catch(e) {
    console.error('GAS 로드 실패:', e);
    return false;
  }
}

// ── CSV에서 읽기 ──
async function loadFromCSV() {
  const csvController = new AbortController();
  const csvTimeout = setTimeout(() => csvController.abort(), 10000);
  const resp = await fetch(CSV_URL, { signal: csvController.signal });
  clearTimeout(csvTimeout);
  if (!resp.ok) throw new Error('CSV fetch 실패: ' + resp.status);
  const text = await resp.text();
  const rows = parseCSV(text);
  const dataRows = rows.slice(HEADER_ROWS);

  allData = [];
  dataRows.forEach((cols, idx) => {
    if (!cols[0] || cols[0].trim() === '') return;
    const resId = (cols[1] || '').trim();
    if (resId === 'Ready') return;

    // Ensure 25 columns
    while (cols.length < 25) cols.push('');

    allData.push({
      rowNum: HEADER_ROWS + 1 + idx,
      raw: cols.map(c => (c || '').trim()),
      A: (cols[0] || '').trim(),
      B: resId,
      C: (cols[2] || '').trim(),
      D: (cols[3] || '').trim(),
      E: (cols[4] || '').trim(),
    });
  });

  renderCards();
  showToast('CSV 데이터 로드 완료: ' + allData.length + '건');
}

// ── 점수 포맷 (소수점 2자리, IRD 등 텍스트는 그대로) ──
function fmtScore(val) {
  if (!val || val.trim() === '') return '-';
  const n = parseFloat(val);
  if (isNaN(n)) return val; // IRD 등 텍스트 그대로
  return n.toFixed(2);
}

// ── Orientation / Scheme 드롭다운 채우기 ──
function populateFilterDropdowns() {
  const dil = document.getElementById('selDilemma').value;
  const dm = DILEMMA_MAP[dil];

  const oriSet = new Set();
  const schSet = new Set();
  allData.forEach(r => {
    const ori = getCellVal(r, dm.orientation);
    const sch = getCellVal(r, dm.scheme);
    if (ori) oriSet.add(ori);
    if (sch) schSet.add(sch);
  });

  const fillSelect = (sel, labelText, valSet) => {
    const prev = sel.value;
    sel.innerHTML = '';
    const def = document.createElement('option');
    def.value = '전체'; def.textContent = labelText;
    sel.appendChild(def);
    const allOpt = document.createElement('option');
    allOpt.value = '전체'; allOpt.textContent = '전체 (All)';
    sel.appendChild(allOpt);
    Array.from(valSet).sort().forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    });
    // 이전 선택 복원 (가능하면)
    if (Array.from(sel.options).some(o => o.value === prev)) sel.value = prev;
    else sel.value = '전체';
  };

  fillSelect(document.getElementById('selOrientation'), 'Orientation', oriSet);
  fillSelect(document.getElementById('selScheme'), 'Scheme', schSet);
}

// ── 필터된 데이터 ──
function getFilteredData() {
  const dil = document.getElementById('selDilemma').value;
  const oriFilter = document.getElementById('selOrientation').value;
  const schFilter = document.getElementById('selScheme').value;
  let filtered = allData.slice();

  const dm = DILEMMA_MAP[dil];
  if (dm) {
    // Orientation 필터
    if (oriFilter !== '전체') {
      filtered = filtered.filter(r => getCellVal(r, dm.orientation) === oriFilter);
    }
    // Scheme 필터
    if (schFilter !== '전체') {
      filtered = filtered.filter(r => getCellVal(r, dm.scheme) === schFilter);
    }
  }

  return filtered;
}

// ── 카드 렌더링 ──
function renderCards() {
  populateFilterDropdowns();
  const data = getFilteredData();
  const dil = document.getElementById('selDilemma').value;
  const container = document.getElementById('cardList');
  container.innerHTML = '';

  const oriFilter = document.getElementById('selOrientation').value;
  const schFilter = document.getElementById('selScheme').value;
  let filterText = '필터: Dilemma-0' + dil;
  if (oriFilter !== '전체') filterText += ' | Orientation=' + oriFilter;
  if (schFilter !== '전체') filterText += ' | Scheme=' + schFilter;
  document.getElementById('infoLeft').textContent = filterText;
  document.getElementById('infoRight').textContent = '총 ' + data.length + '건';

  if (data.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">해당 조건의 데이터가 없습니다.</div>';
    return;
  }

  data.forEach(row => container.appendChild(buildCard(row, dil)));
}

// ── 개별 카드 생성 ──
function buildCard(row, dilemma) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.rownum = row.rowNum;

  // ── Header ──
  const header = document.createElement('div');
  header.className = 'card-header';

  const resid = document.createElement('span');
  resid.className = 'resid';
  resid.textContent = row.B || '-';

  const makeTag = (label, value) => {
    const tag = document.createElement('span');
    tag.className = 'meta-tag';
    tag.innerHTML = '<span class="meta-label">' + label + '</span>' + escHtml(value || '-');
    return tag;
  };

  const modalBtn = document.createElement('button');
  modalBtn.className = 'btn-modal';
  modalBtn.textContent = '전체 응답 보기';
  modalBtn.addEventListener('click', () => openModal(row));

  const ksoLabel = document.createElement('span');
  ksoLabel.className = 'kso-label';
  ksoLabel.textContent = 'Analyzing';

  header.append(resid, makeTag('N2', fmtScore(row.C)), makeTag('P%', fmtScore(row.D)), makeTag('Age', row.E), modalBtn, ksoLabel);
  card.appendChild(header);

  // ── Body ──
  const body = document.createElement('div');
  body.className = 'card-body';

  // Left: Responses
  const respArea = document.createElement('div');
  respArea.className = 'card-responses';
  const dm = DILEMMA_MAP[dilemma];
  respArea.appendChild(makeRespRow('Response-1', getCellVal(row, dm.r1)));
  respArea.appendChild(makeRespRow('Response-2', getCellVal(row, dm.r2)));

  // Keyword field below Response-2
  const kwRow = document.createElement('div');
  kwRow.className = 'resp-row';
  const kwLbl = document.createElement('div');
  kwLbl.className = 'resp-label-side';
  kwLbl.textContent = 'Keyword';
  const kwInput = document.createElement('input');
  kwInput.type = 'text';
  kwInput.className = 'kso-field-input editable-field';
  kwInput.style.cssText = 'flex:1;min-width:0;';
  kwInput.dataset.rownum = row.rowNum;
  kwInput.dataset.dilemma = dilemma;
  kwInput.dataset.field = 'keyword';
  kwInput.value = getCellVal(row, dm.keyword);
  kwRow.append(kwLbl, kwInput);
  respArea.appendChild(kwRow);

  // Right: Analyzing (Scheme / Orientation)
  const ksoArea = document.createElement('div');
  ksoArea.className = 'card-kso-area';

  const fields = [
    { label: 'Scheme',      field: 'scheme',       idx: dm.scheme },
    { label: 'Orientation', field: 'orientation',  idx: dm.orientation },
  ];

  fields.forEach(f => {
    const fieldRow = document.createElement('div');
    fieldRow.className = 'kso-field-row';

    const lbl = document.createElement('span');
    lbl.className = 'kso-field-label';
    lbl.textContent = f.label;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'kso-field-input editable-field';
    input.dataset.rownum = row.rowNum;
    input.dataset.dilemma = dilemma;
    input.dataset.field = f.field;
    input.value = getCellVal(row, f.idx);

    fieldRow.append(lbl, input);
    ksoArea.appendChild(fieldRow);
  });

  body.append(respArea, ksoArea);
  card.appendChild(body);
  return card;
}

// ── 셀 값 가져오기 ──
function getCellVal(row, colIdx) {
  if (!row.raw || colIdx >= row.raw.length) return '';
  return (row.raw[colIdx] || '').trim();
}

// ── Response 행 생성 ──
function makeRespRow(label, text) {
  const div = document.createElement('div');
  div.className = 'resp-row';

  const lbl = document.createElement('div');
  lbl.className = 'resp-label-side';
  lbl.textContent = label;

  const txt = document.createElement('div');
  txt.className = 'resp-text';
  txt.textContent = text;

  div.append(lbl, txt);
  return div;
}

// ── 저장 ──
async function saveAll() {
  if (GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
    showToast('GAS URL을 먼저 설정해주세요!', true);
    return;
  }

  const inputs = document.querySelectorAll('.editable-field');
  if (inputs.length === 0) {
    showToast('저장할 항목이 없습니다.', true);
    return;
  }

  const updates = [];
  inputs.forEach(inp => {
    const rowNum = parseInt(inp.dataset.rownum);
    const dil = inp.dataset.dilemma;
    const field = inp.dataset.field;
    const colKey = field + 'Col';
    updates.push({
      row: rowNum,
      col: DILEMMA_MAP[dil][colKey],
      value: inp.value
    });
  });

  showLoading(true);
  try {
    const resp = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'save', updates }),
      redirect: 'follow'
    });
    const json = await resp.json();
    if (json.status === 'ok') {
      showToast('저장 완료: ' + json.message);
    } else {
      throw new Error(json.message);
    }
  } catch(err) {
    console.error(err);
    showToast('저장 실패: ' + err.message, true);
  } finally {
    showLoading(false);
  }
}

// ── 드롭다운 변경 ──
document.getElementById('selDilemma').addEventListener('change', () => {
  // Dilemma 변경 시 Orientation/Scheme 필터 초기화

// ── UI 유틸 ──
function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
}
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#c62828' : '#333';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Personal Modal ──
const DILEMMA_LABELS = [

  'AI Dilemma 02 - 데이터 관리 (불완전 자료의 사용)',
  'AI Dilemma 03 - 공공성 (인공지능의 공개)',
  'AI Dilemma 04 - 침해금지 (정신적, 신체적 피해 가능성)',

// ── 모달 드래그 앤 드롭 ──
function makeDraggable(headerEl, boxEl) {
  let isDragging = false, startX, startY, origX, origY;

  headerEl.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    const rect = boxEl.getBoundingClientRect();
    boxEl.style.transform = 'none';
    boxEl.style.left = rect.left + 'px';
    boxEl.style.top = rect.top + 'px';
    origX = rect.left; origY = rect.top;
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    boxEl.style.left = (origX + e.clientX - startX) + 'px';
    boxEl.style.top = (origY + e.clientY - startY) + 'px';
  });

  document.addEventListener('mouseup', () => { isDragging = false; });
}

window.addEventListener('DOMContentLoaded', () => {
  const mH = document.querySelector('#modalOverlay .modal-header');
  const mB = document.querySelector('#modalOverlay .modal-box');
  if (mH && mB) makeDraggable(mH, mB);

  const dH = document.querySelector('#docsModalOverlay .docs-modal-header');
  const dB = document.querySelector('#docsModalOverlay .docs-modal-box');
  if (dH && dB) makeDraggable(dH, dB);

  const aH = document.getElementById('analysisHeader');
  const aB = document.getElementById('analysisBox');
  if (aH && aB) makeDraggable(aH, aB);
});

// ── Analysis Modal ──
const CHART_COLORS = ['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

async function openAnalysisModal(mode) {
  const dil = document.getElementById('selDilemma').value;
  const dm = DILEMMA_MAP[dil];
  const dilLabel = 'Dilemma-0' + dil;
  const groupLabel = mode === 'orientation' ? 'Orientation' : 'Scheme';
  const groupIdx = mode === 'orientation' ? dm.orientation : dm.scheme;

  // 모달을 먼저 열고 로딩 표시
  document.getElementById('analysisTitle').textContent = groupLabel + '별 분석';
  document.getElementById('analysisSubtitle').textContent = dilLabel + ' 기준';
  const body = document.getElementById('analysisBody');
  body.innerHTML = '<div class="analysis-loading"><div class="analysis-spinner"></div><div>데이터 분석 중...</div></div>';
  document.getElementById('analysisOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';

  // 시트에서 최신 데이터 다시 로드
  try {
    if (GAS_URL && GAS_URL !== 'YOUR_GAS_WEB_APP_URL_HERE') {
      const resp = await fetch(GAS_URL);
      const json = await resp.json();
      if (json.status === 'ok') {
        allData = [];
        json.data.forEach(r => {
          if (r.B && r.B.trim() === 'Ready') return;
          const rawArr = COL_LETTERS.split('').map(c => r[c] || '');
          allData.push({ rowNum: r.rowNum, raw: rawArr, A: r.A, B: r.B, C: r.C, D: r.D, E: r.E });
        });
      }
    }
  } catch(e) {
    console.error('분석용 데이터 로드 실패:', e);
  }

  await new Promise(r => setTimeout(r, 300)); // UI 업데이트 대기

  // 그룹핑
  const groups = {};
  allData.forEach(r => {
    const key = getCellVal(r, groupIdx) || '(미입력)';
    if (!groups[key]) groups[key] = { n2: [], p: [], age: [], count: 0 };
    groups[key].count++;
    const n2 = parseFloat(r.C); if (!isNaN(n2)) groups[key].n2.push(n2);
    const p = parseFloat(r.D);  if (!isNaN(p))  groups[key].p.push(p);
    const a = parseFloat(r.E);  if (!isNaN(a))  groups[key].age.push(a);
  });

  const labels = Object.keys(groups).sort();
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  const median = arr => {
    if (!arr.length) return 0;
    const s = arr.slice().sort((a,b)=>a-b);
    const m = Math.floor(s.length/2);
    return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
  };
  const q1 = arr => { const s = arr.slice().sort((a,b)=>a-b); return median(s.slice(0, Math.floor(s.length/2))); };
  const q3 = arr => { const s = arr.slice().sort((a,b)=>a-b); return median(s.slice(Math.ceil(s.length/2))); };

  function boxStats(arr) {
    if (!arr.length) return null;
    const s = arr.slice().sort((a,b)=>a-b);
    return { min:s[0], q1:q1(s), med:median(s), q3:q3(s), max:s[s.length-1], avg:avg(s), n:s.length };
  }

  body.innerHTML = '';

  if (labels.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">분석할 데이터가 없습니다.</div>';
    return;
  }

  const dpr = window.devicePixelRatio || 1;
  const wrap = document.createElement('div');
  wrap.className = 'analysis-charts';

  // ── 1) 빈도 분석 (Frequency) ──
  const freqSec = document.createElement('div');
  freqSec.className = 'analysis-chart-section';
  const freqTitle = document.createElement('div');
  freqTitle.className = 'analysis-chart-title';
  freqTitle.textContent = groupLabel + '별 빈도 (Frequency)';
  const freqWrap = document.createElement('div');
  freqWrap.className = 'analysis-chart-wrap';
  const freqCanvas = document.createElement('canvas');
  freqCanvas.style.width = '100%';
  freqCanvas.style.height = '280px';
  freqWrap.appendChild(freqCanvas);
  freqSec.append(freqTitle, freqWrap);
  wrap.appendChild(freqSec);

  // ── 2) Box Plots ──
  const bpN2  = labels.map(k => ({ label:k, ...boxStats(groups[k].n2) }));
  const bpP   = labels.map(k => ({ label:k, ...boxStats(groups[k].p) }));
  const bpAge = labels.map(k => ({ label:k, ...boxStats(groups[k].age) }));

  const chartDefs = [
    { title: 'N2 Score (by ' + groupLabel + ')', data: bpN2,  color: '#3b82f6' },
    { title: 'P% Score (by ' + groupLabel + ')', data: bpP,   color: '#f59e0b' },
    { title: 'Age (by ' + groupLabel + ')',       data: bpAge, color: '#10b981' },
  ];

  const pendingCanvases = [];
  chartDefs.forEach(cd => {
    const sec = document.createElement('div');
    sec.className = 'analysis-chart-section';
    const t = document.createElement('div');
    t.className = 'analysis-chart-title';
    t.textContent = cd.title;
    const cw = document.createElement('div');
    cw.className = 'analysis-chart-wrap';
    const canvas = document.createElement('canvas');
    canvas.style.width = '100%';
    canvas.style.height = '300px';
    cw.appendChild(canvas);
    sec.append(t, cw);
    wrap.appendChild(sec);
    pendingCanvases.push({ canvas, data: cd.data, color: cd.color });
  });

  // ── 3) Summary table ──
  const sumSec = document.createElement('div');
  sumSec.className = 'analysis-summary';
  let tbl = '<table><thead><tr><th>' + groupLabel + '</th><th>빈도</th><th>N2 평균</th><th>N2 중앙값</th><th>P% 평균</th><th>P% 중앙값</th><th>Age 평균</th><th>Age 중앙값</th></tr></thead><tbody>';
  let totalN=0, sumN2=0, sumP=0, sumAge=0;
  labels.forEach(k => {
    const sn2 = boxStats(groups[k].n2);
    const sp  = boxStats(groups[k].p);
    const sa  = boxStats(groups[k].age);
    const cn = groups[k].count;
    totalN += cn;
    if(sn2) sumN2 += sn2.avg * sn2.n;
    if(sp)  sumP  += sp.avg * sp.n;
    if(sa)  sumAge+= sa.avg * sa.n;
    tbl += '<tr><td style="font-weight:600;color:#1e293b">' + escHtml(k) + '</td><td>' + cn + '</td>';
    tbl += '<td>' + (sn2?sn2.avg.toFixed(2):'-') + '</td><td>' + (sn2?sn2.med.toFixed(2):'-') + '</td>';
    tbl += '<td>' + (sp?sp.avg.toFixed(2):'-') + '</td><td>' + (sp?sp.med.toFixed(2):'-') + '</td>';
    tbl += '<td>' + (sa?sa.avg.toFixed(1):'-') + '</td><td>' + (sa?sa.med.toFixed(1):'-') + '</td></tr>';
  });
  const numN2 = allData.filter(r=>!isNaN(parseFloat(r.C))).length;
  const numP  = allData.filter(r=>!isNaN(parseFloat(r.D))).length;
  const numAge= allData.filter(r=>!isNaN(parseFloat(r.E))).length;
  tbl += '<tr style="background:#f1f5f9;font-weight:600"><td>전체</td><td>'+totalN+'</td>';
  tbl += '<td>'+(numN2?(sumN2/numN2).toFixed(2):'-')+'</td><td>-</td>';
  tbl += '<td>'+(numP?(sumP/numP).toFixed(2):'-')+'</td><td>-</td>';
  tbl += '<td>'+(numAge?(sumAge/numAge).toFixed(1):'-')+'</td><td>-</td></tr>';
  tbl += '</tbody></table>';
  sumSec.innerHTML = tbl;

  wrap.appendChild(sumSec);
  body.appendChild(wrap);
  body.scrollTop = 0;

  // DOM에 삽입된 후 실제 너비로 Canvas 그리기
  requestAnimationFrame(() => {
    // Frequency chart
    const fw = freqCanvas.parentElement.clientWidth - 32;
    freqCanvas.width = fw * dpr;
    freqCanvas.height = 280 * dpr;
    freqCanvas.style.width = fw + 'px';
    drawFreqChart(freqCanvas, labels.map(k => ({ label: k, count: groups[k].count })), dpr);

    // Box plots
    pendingCanvases.forEach(pc => {
      const pw = pc.canvas.parentElement.clientWidth - 32;
      pc.canvas.width = pw * dpr;
      pc.canvas.height = 300 * dpr;
      pc.canvas.style.width = pw + 'px';
      drawBoxPlot(pc.canvas, pc.data, pc.color, dpr);
    });
  });

  // 카드 목록도 갱신
  renderCards();
}

function closeAnalysis() {
  document.getElementById('analysisOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

  const style = document.createElement('style');
  style.id = 'analysis-print-style';
  style.textContent = '@media print { @page { size:A4 portrait; margin:12mm; } }';

  document.body.classList.add('printing-analysis');

function drawFreqChart(canvas, data, dpr) {
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const padL = 50, padR = 20, padT = 20, padB = 55;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  ctx.clearRect(0, 0, W, H);
  if (!data.length) return;

  const maxCount = Math.max(...data.map(d => d.count), 1);
  const total = data.reduce((s,d) => s + d.count, 0);
  const gap = chartW / data.length;
  const barW = Math.min(60, gap * 0.55);
  const colors = ['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

  // Grid
  const gridLines = 5;
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  ctx.fillStyle = '#94a3b8'; ctx.font = '11px Inter, sans-serif'; ctx.textAlign = 'right';
  for (let i = 0; i <= gridLines; i++) {
    const val = Math.round(maxCount * i / gridLines);
    const y = padT + chartH - (chartH * i / gridLines);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillText(val, padL - 6, y + 4);
  }

  // Bars
  data.forEach((d, i) => {
    const x = padL + gap * i + (gap - barW) / 2;
    const barH = (d.count / maxCount) * chartH;
    const y = padT + chartH - barH;

    const color = colors[i % colors.length];
    const grad = ctx.createLinearGradient(x, y, x, padT + chartH);
    grad.addColorStop(0, color); grad.addColorStop(1, color + '88');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(x, y, barW, barH, [4,4,0,0]); ctx.fill();

    // Count + percentage
    ctx.fillStyle = '#1e293b'; ctx.font = 'bold 13px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d.count, x + barW/2, y - 8);
    ctx.fillStyle = '#94a3b8'; ctx.font = '10px Inter, sans-serif';
    ctx.fillText((d.count/total*100).toFixed(1) + '%', x + barW/2, y - 22);

    // Label
    ctx.save();
    ctx.fillStyle = '#334155'; ctx.font = '12px Inter, sans-serif';
    const lx = x + barW/2, ly = padT + chartH + 16;
    if (data.length > 5) {
      ctx.translate(lx, ly); ctx.rotate(-Math.PI/7); ctx.textAlign = 'right';
      ctx.fillText(d.label.length > 12 ? d.label.slice(0,11)+'…' : d.label, 0, 0);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText(d.label.length > 16 ? d.label.slice(0,15)+'…' : d.label, lx, ly);
    }
    ctx.restore();
  });
}

function drawBoxPlot(canvas, data, baseColor, dpr) {
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const padL = 55, padR = 25, padT = 30, padB = 55;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  ctx.clearRect(0, 0, W, H);
  if (!data.length || data.every(d => !d.n)) return;

  // Global min/max across all groups
  let gMin = Infinity, gMax = -Infinity;
  data.forEach(d => {
    if (d.n) { gMin = Math.min(gMin, d.min); gMax = Math.max(gMax, d.max); }
  });
  const range = gMax - gMin || 1;
  const vMin = gMin - range * 0.1;
  const vMax = gMax + range * 0.1;
  const vRange = vMax - vMin;

  const toY = v => padT + chartH - ((v - vMin) / vRange) * chartH;
  const gap = chartW / data.length;
  const boxW = Math.min(56, gap * 0.55);

  // Grid
  const gridLines = 5;
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px Inter, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= gridLines; i++) {
    const val = vMin + (vRange * i / gridLines);
    const y = toY(val);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillText(val.toFixed(1), padL - 6, y + 4);
  }

  // Baseline
  ctx.strokeStyle = '#cbd5e1';
  ctx.beginPath(); ctx.moveTo(padL, padT + chartH); ctx.lineTo(W - padR, padT + chartH); ctx.stroke();

  // Each box plot
  data.forEach((d, i) => {
    if (!d.n) return;
    const cx = padL + gap * i + gap / 2;
    const bx = cx - boxW / 2;

    const yMin = toY(d.min);
    const yQ1  = toY(d.q1);
    const yMed = toY(d.med);
    const yQ3  = toY(d.q3);
    const yMax = toY(d.max);
    const yAvg = toY(d.avg);

    // Whisker lines
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 1.5;
    // Lower whisker (min to Q1)
    ctx.beginPath(); ctx.moveTo(cx, yQ1); ctx.lineTo(cx, yMin); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - boxW*0.25, yMin); ctx.lineTo(cx + boxW*0.25, yMin); ctx.stroke();
    // Upper whisker (Q3 to max)
    ctx.beginPath(); ctx.moveTo(cx, yQ3); ctx.lineTo(cx, yMax); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - boxW*0.25, yMax); ctx.lineTo(cx + boxW*0.25, yMax); ctx.stroke();

    // Box (Q1 to Q3)
    const boxH = yQ1 - yQ3;
    ctx.fillStyle = baseColor + '25';
    ctx.strokeStyle = baseColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, yQ3, boxW, boxH, 3);
    ctx.fill(); ctx.stroke();

    // Median line
    ctx.strokeStyle = baseColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(bx + 2, yMed); ctx.lineTo(bx + boxW - 2, yMed); ctx.stroke();

    // Mean diamond
    ctx.fillStyle = '#ef4444';
    const ds = 4;
    ctx.beginPath();
    ctx.moveTo(cx, yAvg - ds);
    ctx.lineTo(cx + ds, yAvg);
    ctx.lineTo(cx, yAvg + ds);
    ctx.lineTo(cx - ds, yAvg);
    ctx.closePath();
    ctx.fill();

    // Stats annotation (right side of box)
    ctx.fillStyle = '#475569';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'left';
    const ax = bx + boxW + 5;
    ctx.fillText('max ' + d.max.toFixed(1), ax, yMax + 3);
    ctx.fillText('Q3 ' + d.q3.toFixed(1), ax, yQ3 + 3);
    ctx.fillText('med ' + d.med.toFixed(1), ax, yMed + 3);
    ctx.fillText('Q1 ' + d.q1.toFixed(1), ax, yQ1 + 3);
    ctx.fillText('min ' + d.min.toFixed(1), ax, yMin + 3);

    // n count above
    ctx.fillStyle = '#94a3b8';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('n=' + d.n, cx, yMax - 10);

    // Label below
    ctx.save();
    ctx.fillStyle = '#334155';
    ctx.font = '12px Inter, sans-serif';
    const ly = padT + chartH + 16;
    if (data.length > 5) {
      ctx.translate(cx, ly);
      ctx.rotate(-Math.PI / 7);
      ctx.textAlign = 'right';
      ctx.fillText(d.label.length > 12 ? d.label.slice(0,11)+'…' : d.label, 0, 0);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText(d.label.length > 16 ? d.label.slice(0,15)+'…' : d.label, cx, ly);
    }
    ctx.restore();
  });

  // Legend
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'left';
  // Median legend
  ctx.strokeStyle = baseColor; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(padL + 4, 12); ctx.lineTo(padL + 18, 12); ctx.stroke();
  ctx.fillStyle = '#475569';
  ctx.fillText('중앙값(Median)', padL + 22, 15);
  // Mean legend
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.moveTo(padL + 110, 8); ctx.lineTo(padL+114, 12); ctx.lineTo(padL+110, 16); ctx.lineTo(padL+106, 12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#475569';
  ctx.fillText('평균(Mean)', padL + 118, 15);
}
